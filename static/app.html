<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cliply — Repurpose Video</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#FF6B6B;--accent-dark:#e85555;--accent-light:#fff0f0;--text:#1A1A2E;--muted:#6B7280;--bg:#FFFFFF;--surface:#F9FAFB;--border:#E5E7EB;--radius:12px}
body{font-family:'Inter',sans-serif;color:var(--text);background:var(--bg);min-height:100vh}

nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid var(--border);background:white}
.logo{font-weight:800;font-size:1.15rem;display:flex;align-items:center;gap:6px;text-decoration:none;color:var(--text)}
.logo-icon{width:26px;height:26px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:900}
.nav-right{display:flex;align-items:center;gap:1rem}
.usage-badge{font-size:0.8rem;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:4px 10px;border-radius:100px}
.btn-upgrade{background:var(--accent);color:white;padding:0.5rem 1rem;border-radius:8px;font-weight:600;font-size:0.85rem;border:none;cursor:pointer;font-family:'Inter',sans-serif;transition:background .2s}
.btn-upgrade:hover{background:var(--accent-dark)}

main{max-width:720px;margin:0 auto;padding:3rem 2rem}
h1{font-size:1.75rem;font-weight:800;letter-spacing:-0.02em;margin-bottom:0.5rem}
.subtitle{color:var(--muted);font-size:0.95rem;margin-bottom:2rem}

.input-wrap{display:flex;gap:0.75rem;margin-bottom:2rem}
.url-input{flex:1;border:1.5px solid var(--border);border-radius:var(--radius);padding:0.85rem 1rem;font-size:0.95rem;font-family:'Inter',sans-serif;color:var(--text);background:white;transition:border-color .2s;outline:none}
.url-input:focus{border-color:var(--accent)}
.url-input::placeholder{color:#9CA3AF}
.go-btn{background:var(--accent);color:white;border:none;border-radius:var(--radius);padding:0.85rem 1.5rem;font-weight:700;font-size:0.95rem;cursor:pointer;transition:background .2s;font-family:'Inter',sans-serif;white-space:nowrap}
.go-btn:hover{background:var(--accent-dark)}
.go-btn:disabled{opacity:0.5;cursor:not-allowed}

.progress{display:none;margin-bottom:2rem}
.progress.show{display:block}
.progress-step{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1rem;border-radius:10px;font-size:0.9rem;margin-bottom:0.5rem;background:var(--surface);border:1px solid var(--border)}
.progress-step.active{border-color:var(--accent);background:var(--accent-light)}
.progress-step.done{border-color:#10b981;background:#f0fdf4}
.step-icon{font-size:1.1rem;width:24px;text-align:center}
.step-text{font-weight:500}

.result{display:none}
.result.show{display:block}
.result-title{font-size:1rem;font-weight:700;margin-bottom:1.5rem;color:var(--muted)}

.tabs{display:flex;gap:0.25rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:1.5rem}
.tab{flex:1;padding:0.6rem 0.5rem;border-radius:8px;border:none;background:none;cursor:pointer;font-size:0.8rem;font-weight:600;color:var(--muted);transition:all .2s;font-family:'Inter',sans-serif;text-align:center}
.tab.active{background:white;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.1)}

.tab-content{display:none}
.tab-content.active{display:block}

.hook-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:0.75rem;position:relative}
.hook-text{font-size:0.9rem;line-height:1.6;padding-right:2.5rem}

.content-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.25rem;font-size:0.9rem;line-height:1.7;white-space:pre-wrap;position:relative;min-height:120px}

.copy-btn{position:absolute;top:0.75rem;right:0.75rem;background:white;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:0.75rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;color:var(--muted)}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}
.copy-btn.copied{background:var(--accent);color:white;border-color:var(--accent)}

.transcript-toggle{font-size:0.8rem;color:var(--muted);cursor:pointer;text-decoration:underline;margin-top:1rem;display:inline-block}
.transcript-box{display:none;margin-top:0.75rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem;font-size:0.8rem;color:var(--muted);line-height:1.6;max-height:200px;overflow-y:auto}
.transcript-box.show{display:block}

.error-box{background:#fff5f5;border:1px solid #fca5a5;border-radius:10px;padding:1rem;color:#dc2626;font-size:0.9rem;display:none;margin-bottom:1rem}
.error-box.show{display:block}

@media(max-width:600px){
  .input-wrap{flex-direction:column}
  main{padding:2rem 1.25rem}
  .tabs{flex-wrap:wrap}
}
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">
    <div class="logo-icon">C</div>
    Cliply
  </a>
  <div class="nav-right">
    <span class="usage-badge" id="usage-text">1 free / day</span>
    <button class="btn-upgrade" id="upgrade-btn">Upgrade to Pro →</button>
  </div>
</nav>

<main>
  <h1>Repurpose your video</h1>
  <p class="subtitle">Paste any YouTube URL below. We'll turn it into 4 pieces of content.</p>

  <div class="input-wrap">
    <input type="text" class="url-input" id="url-input" placeholder="https://www.youtube.com/watch?v=...">
    <button class="go-btn" id="go-btn" onclick="repurpose()">Repurpose →</button>
  </div>

  <div class="error-box" id="error-box"></div>

  <div class="progress" id="progress">
    <div class="progress-step" id="step-download">
      <span class="step-icon">⬇️</span>
      <span class="step-text">Downloading audio...</span>
    </div>
    <div class="progress-step" id="step-transcribe">
      <span class="step-icon">🎙️</span>
      <span class="step-text">Transcribing with Whisper...</span>
    </div>
    <div class="progress-step" id="step-generate">
      <span class="step-icon">🤖</span>
      <span class="step-text">Generating content with Claude AI...</span>
    </div>
  </div>

  <div class="result" id="result">
    <div class="result-title" id="result-title"></div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('tiktok', this)">🎵 TikTok</button>
      <button class="tab" onclick="switchTab('linkedin', this)">💼 LinkedIn</button>
      <button class="tab" onclick="switchTab('twitter', this)">🐦 Twitter</button>
      <button class="tab" onclick="switchTab('newsletter', this)">📧 Newsletter</button>
    </div>

    <div class="tab-content active" id="tab-tiktok">
      <div id="tiktok-hooks"></div>
    </div>

    <div class="tab-content" id="tab-linkedin">
      <div class="content-box" id="linkedin-content">
        <button class="copy-btn" onclick="copyContent('linkedin-content', this)">Copy</button>
      </div>
    </div>

    <div class="tab-content" id="tab-twitter">
      <div class="content-box" id="twitter-content">
        <button class="copy-btn" onclick="copyContent('twitter-content', this)">Copy</button>
      </div>
    </div>

    <div class="tab-content" id="tab-newsletter">
      <div class="content-box" id="newsletter-content">
        <button class="copy-btn" onclick="copyContent('newsletter-content', this)">Copy</button>
      </div>
    </div>

    <span class="transcript-toggle" onclick="toggleTranscript()">View transcript</span>
    <div class="transcript-box" id="transcript-box"></div>
  </div>
</main>

<script>
let usageCount = 0;
const MAX_FREE = 1;

function getProEmail() {
  return localStorage.getItem('cliply_pro_email') || '';
}

async function repurpose() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;

  const isPro = localStorage.getItem('cliply_pro') === 'true';
  if (!isPro && usageCount >= MAX_FREE) {
    showError('Daily free limit reached. Upgrade to Pro for unlimited repurposes.');
    return;
  }

  const btn = document.getElementById('go-btn');
  btn.disabled = true;
  btn.textContent = 'Processing...';
  hideError();
  showProgress();
  hideResult();

  try {
    const body = {url};
    if (isPro && getProEmail()) body.email = getProEmail();

    const res = await fetch('/repurpose', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || 'Something went wrong');
    }

    const data = await res.json();
    usageCount++;
    displayResult(data);
  } catch (e) {
    showError(e.message || 'Failed to process video. Please try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Repurpose →';
    hideProgress();
  }
}

function displayResult(data) {
  document.getElementById('result-title').textContent = `✅ "${data.title}"`;

  // TikTok hooks
  const hooksEl = document.getElementById('tiktok-hooks');
  hooksEl.innerHTML = '';
  (data.content.tiktok_hooks || []).forEach((hook, i) => {
    hooksEl.innerHTML += `
      <div class="hook-card">
        <div class="hook-text">${hook}</div>
        <button class="copy-btn" style="top:50%;transform:translateY(-50%)" onclick="copyText('${escapeQuotes(hook)}', this)">Copy</button>
      </div>`;
  });

  // LinkedIn
  const liEl = document.getElementById('linkedin-content');
  liEl.childNodes[0].textContent = data.content.linkedin_post || '';

  // Twitter
  const twEl = document.getElementById('twitter-content');
  twEl.childNodes[0].textContent = data.content.twitter_thread || '';

  // Newsletter
  const nlEl = document.getElementById('newsletter-content');
  nlEl.childNodes[0].textContent = data.content.newsletter || '';

  // Transcript
  document.getElementById('transcript-box').textContent = data.transcript || '';

  showResult();
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
}

function copyContent(elementId, btn) {
  const el = document.getElementById(elementId);
  const text = el.childNodes[0].textContent;
  copyText(text, btn);
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text);
  const orig = btn.textContent;
  btn.textContent = 'Copied!';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
}

function escapeQuotes(str) {
  return str.replace(/'/g, "\\'").replace(/"/g, '\\"');
}

function toggleTranscript() {
  document.getElementById('transcript-box').classList.toggle('show');
}

function showProgress() { document.getElementById('progress').classList.add('show'); }
function hideProgress() { document.getElementById('progress').classList.remove('show'); }
function showResult() { document.getElementById('result').classList.add('show'); }
function hideResult() { document.getElementById('result').classList.remove('show'); }
function showError(msg) { const e = document.getElementById('error-box'); e.textContent = msg; e.classList.add('show'); }
function hideError() { document.getElementById('error-box').classList.remove('show'); }

// Enter key
document.getElementById('url-input').addEventListener('keydown', e => { if (e.key === 'Enter') repurpose(); });

// Upgrade button
document.getElementById('upgrade-btn').addEventListener('click', async () => {
  const res = await fetch('/create-checkout-session', {method:'POST'});
  const data = await res.json();
  if (data.url) location.href = data.url;
});

// Check pro status on load
(async () => {
  const email = getProEmail();
  if (email) {
    try {
      const res = await fetch('/verify-subscription', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email})
      });
      const data = await res.json();
      if (data.pro) {
        localStorage.setItem('cliply_pro', 'true');
        document.getElementById('usage-text').textContent = 'Pro — Unlimited';
        document.getElementById('upgrade-btn').textContent = '✓ Pro';
        document.getElementById('upgrade-btn').style.background = '#10b981';
        document.getElementById('upgrade-btn').style.cursor = 'default';
        document.getElementById('upgrade-btn').onclick = null;
      } else {
        // subscription may have expired
        localStorage.removeItem('cliply_pro');
        localStorage.removeItem('cliply_pro_email');
      }
    } catch {}
  } else if (localStorage.getItem('cliply_pro') === 'true') {
    document.getElementById('usage-text').textContent = 'Pro — Unlimited';
    document.getElementById('upgrade-btn').textContent = '✓ Pro';
    document.getElementById('upgrade-btn').style.background = '#10b981';
  }
})();
</script>
</body>
</html>
